<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Monitor Saal B - LMRL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        /* --- LMRL FARBPALETTE --- */
        :root {
            --lmrl-orange: #E36C2D;
            --lmrl-bg-orange: #d96528;
            --lmrl-bg-gradient: linear-gradient(135deg, #d96528 0%, #c75b24 100%);
            --lmrl-light: #ffffff;
            --text-muted: #999;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: var(--lmrl-bg-gradient);
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .logo-container {
            position: absolute;
            top: 30px;
            right: 30px;
            z-index: 100;
        }
        .logo-img {
            width: 100px;
            height: auto;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
        }

        .monitor-card {
            background-color: var(--lmrl-light);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
            width: 85vw;
            height: 75vh; 
            margin-bottom: 30px;
        }

        .side-display {
            font-size: 4.5vh;
            color: var(--text-muted);
            font-weight: 300;
            opacity: 0.7;
            margin: 0.5vh 0;
        }

        .label {
            font-size: 2.5vh; 
            color: #888;
            margin-bottom: -1vh;
            margin-top: 2vh;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        #anzeige {
            font-weight: bold;
            color: var(--lmrl-orange);
            line-height: 1.0;
            word-break: break-word; 
            width: 100%;
            font-size: 18vh;
            margin: 0;
        }

        /* FYI SEKTION UNTEN */
        .fyi-section {
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
            width: 85vw;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .fyi-title {
            font-weight: bold;
            color: var(--lmrl-orange);
            margin-bottom: 10px;
            display: block;
            font-size: 1.2rem;
        }

        /* --- NEU: Container für mehrere Bilder --- */
        .image-wrapper {
            display: flex;
            justify-content: center;
            gap: 20px; /* Abstand zwischen den beiden Bildern */
            align-items: flex-start;
            margin-top: 15px;
        }

        .info-img {
            max-width: 48%; /* Jedes Bild nimmt maximal knapp die halbe Breite ein */
            height: auto;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        @keyframes pulse-orange {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(227, 108, 45, 0.7); }
            50% { transform: scale(1.02); box-shadow: 0 0 0 30px rgba(227, 108, 45, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(227, 108, 45, 0); }
        }

        .update-anim {
            animation: pulse-orange 1.2s ease-out;
        }

        @media (max-width: 768px) {
            body {
                justify-content: flex-start; 
                padding-top: 90px; 
                padding-bottom: 30px;
                overflow-y: auto; 
            }

            .logo-container {
                top: 15px;
                right: 15px;
            }

            .logo-img {
                width: 65px; 
                border-radius: 8px; 
            }

            .monitor-card { 
                width: 90vw; 
                height: auto; 
                min-height: auto;
                padding: 30px 15px; 
                margin-top: 10px;
                margin-bottom: 25px;
                box-sizing: border-box;
            }

            .label { 
                font-size: 14px; 
                margin-top: 20px; 
                margin-bottom: 5px;
            }

            #anzeige { 
                font-size: 18vw; 
                margin: 10px 0;
            }

            .side-display { 
                font-size: 18px; 
                margin: 5px 0;
            }
            
            #nachher2 {
                font-size: 14px !important; 
            }

            .fyi-section { 
                width: 90vw; 
                padding: 20px;
                box-sizing: border-box; 
            }
            
            .fyi-title {
                font-size: 1.1rem;
            }

            /* --- NEU: Bilder auf dem Handy untereinander --- */
            .image-wrapper {
                flex-direction: column;
                align-items: center;
                gap: 15px;
            }
            .info-img {
                max-width: 100%; /* Auf dem Handy wieder die volle Breite nutzen */
            }
        }
    </style>
